<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Luke's Site - Home</title>
        <meta name="description" content="Luke's Website - home">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="home.css">
    </head>
    <body>
        <div class="tabs">
            <button class="tab-button" data-tab-target="#tab-1">RNG Game</button>
            <button class="tab-button" data-tab-target="#tab-2">CPS Test</button>
            <button class="tab-button" data-tab-target="#tab-3">I Don't Care</button>
            <div id="tab-1" class="tab-content">
              <h2>RNG Game</h2>
                <button id="1" onclick="checkGuess(1)">1</button>
                <button id="2" onclick="checkGuess(2)">2</button>
                <button id="3" onclick="checkGuess(3)">3</button>
                <br>
                <button id="4" onclick="checkGuess(4)">4</button>
                <button id="5" onclick="checkGuess(5)">5</button>
                <button id="6" onclick="checkGuess(6)">6</button>
                <br>
                <button id="7" onclick="checkGuess(7)">7</button>
                <button id="8" onclick="checkGuess(8)">8</button>
        <button id="9" onclick="checkGuess(9)">9</button>
            </div>
            <div id="tab-2" class="tab-content">
                <div id="content">
                    Timer: <span id="timer"></span><br/>
                    Score: <span id="score"></span><br/>
                    CPS: <span id="clicks"></span>
                  </div>
                  <div id="clickarea">
                    <button id="start">Start</button>
                  </div>
            </div>
            <div id="tab-3" class="tab-content">
                <h1>I Don't Care</h1>
            </div>
          </div>
        <script src="home.js" async defer></script>
    </body>
</html>
