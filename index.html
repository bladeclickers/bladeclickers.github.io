<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bladeclickers</title>
  <link rel="icon" href="ryh.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://ruffle.io; style-src 'self' 'unsafe-inline'; img-src 'self' https://raw.githubusercontent.com data:; frame-src 'self' https://bladeclickers.github.io; connect-src 'self' https://bladeclickers.github.io;">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI Semibold', sans-serif;
      background: #333;
      display: flex;
      overflow: hidden;
    }

    .layout {
      display: flex;
      flex-grow: 1;
      height: 100vh;
    }

    .sidebar {
      width: 70px;
      background: #222;
      padding: 10px 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: width 0.3s ease;
      overflow: hidden;
    }

    .sidebar:hover {
      width: 220px;
    }

    .logo {
      width: 40px;
      height: 40px;
      margin-bottom: 10px;
    }

    .mini-text {
      color: white;
      font-size: 12px;
      text-align: center;
      line-height: 1.2;
    }

    .sidebar-content {
      opacity: 0;
      transform: translateX(-10px);
      transition: 0.25s ease;
      width: 100%;
    }

    .sidebar:hover .sidebar-content {
      opacity: 1;
      transform: translateX(0);
    }

    .sidebar button {
      width: 100%;
      margin-top: 8px;
      padding: 6px;
      border: none;
      border-radius: 8px;
      background: #444;
      color: white;
      cursor: pointer;
      font-size: 12px;
      transition: 0.2s;
    }

    .sidebar button:hover {
      background: #666;
    }

    .category-container {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .category-container.show {
      max-height: 400px;
    }

    .category-buttons {
      display: flex;
      flex-wrap: wrap;
      font-family: 'Segoe UI Semibold', sans-serif;
      gap: 2px;
      margin-top: 8px;
    }

    .category-btn {
      padding: 5px;
      font-family: 'Segoe UI Semibold', sans-serif;
      font-size: 11px;
      border-radius: 6px;
      border: none;
      background: #555;
      color: white;
      cursor: pointer;
    }

    .category-btn.active {
      background: white;
      color: black;
    }

    .search-overlay {
      position: fixed;
      top: 13px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20000;
      display: none;
    }

    .search-overlay.active {
      display: block;
    }

    .search-box {
      padding: 12px 20px;
      font-size: 18px;
      border-radius: 12px;
      font-family: 'Segoe UI Semibold', sans-serif;
      border: none;
      width: 750px;
      height: 11px;
      text-align: center;
      transition: width 0.3s ease, height 0.3s ease;
    }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      transition: margin-top 0.3s ease;
      padding-top: 30px;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 20px;
      margin-top: 0;
      transition: all 0.3s ease;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .button-link {
      background: #eee;
      border-radius: 15px;
      width: 240px;
      margin: 12px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.25s;
    }

    .button-link:hover {
      transform: translateY(-5px);
      background: #fff;
    }

    .sigma {
      width: 160px;
      height: 120px;
      border-radius: 10px;
    }

    .game-title {
      margin-top: 0px;
      color: black;
      font-size: 16px;
    }

    #backButton {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10000;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #FFFFFFAA url('back.png') no-repeat center;
      background-size: 50%;
      cursor: pointer;
    }

    .game-iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 9999;
    }

    #errorMsg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      color: red;
      padding: 20px;
      border-radius: 10px;
      z-index: 10001;
      font-family: monospace;
      font-size: 18px;
      text-align: center;
    }

    body.game-active .search-overlay {
      display: none !important;
    }
    
    body.game-active .sidebar {
      display: none !important;
    }
    
    body.game-active .layout {
      display: none !important;
    }
    
    body.game-active .main {
      display: none !important;
    }
  </style>
  <script src="ruffle/ruffle.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4127522858453635" crossorigin="anonymous"></script>
</head>
<body>

<div class="search-overlay" id="searchOverlay">
  <input class="search-box" id="searchInput" placeholder="Search games...">
</div>

<div class="layout">
  <div class="sidebar">
    <img src="logo2.png" class="logo" />
    <div class="mini-text">bladeclickers<br>—<br>made by bladeskilled</div>

    <div class="sidebar-content">
      <button id="searchBtn" style="font-family: 'Segoe UI Semibold', sans-serif;">⌕   Search</button>
      <button id="toggleCategories" style="font-family: 'Segoe UI Semibold', sans-serif;">🗀   Categories</button>

      <div class="category-container" id="categoryContainer">
        <div class="category-buttons">
          <button class="category-btn active" data-category="">All</button>
          <button class="category-btn" data-category="action">Action</button>
          <button class="category-btn" data-category="arcade">Arcade</button>
          <button class="category-btn" data-category="puzzle">Puzzle</button>
          <button class="category-btn" data-category="rpg">RPG</button>
          <button class="category-btn" data-category="shooter">Shooter</button>
          <button class="category-btn" data-category="sports">Sports</button>
          <button class="category-btn" data-category="adventure">Adventure</button>
          <button class="category-btn" data-category="platformer">Platformer</button>
          <button class="category-btn" data-category="racing">Racing</button>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <h1>bladeclickers.github.io</h1>
    <div class="button-container"></div>
  </div>
</div>

<script src="gamelist.js"></script>
<script>
function sanitizeGameName(name) {
  if (!name || typeof name !== 'string') {
    console.warn('Invalid game name: empty or not a string');
    return null;
  }
  if (!/^[a-zA-Z0-9_. -]+$/.test(name)) {
    console.warn('Invalid game name (disallowed characters):', name);
    return null;
  }
  if (name.includes('..') || name.includes('/') || name.includes('\\')) {
    console.warn('Invalid game name (path traversal):', name);
    return null;
  }
  if (/^[ .]/.test(name) || /[ .]$/.test(name)) {
    console.warn('Invalid game name (leading/trailing dot or space):', name);
    return null;
  }
  return name;
}

async function urlExists(url) {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);
    const res = await fetch(url, { method: "HEAD", signal: controller.signal });
    clearTimeout(timeoutId);
    return res.ok;
  } catch { 
    return false; 
  }
}

function closeSearchOverlay() {
  const overlay = document.getElementById('searchOverlay');
  const main = document.querySelector('.main');
  if (overlay.classList.contains('active')) {
    overlay.classList.remove('active');
    main.style.marginTop = '0px';
    isSearchOpen = false;
  }
}

let currentGameFrame = null;
let isSearchOpen = false;

function removeGame() {
  if (currentGameFrame) {
    if (currentGameFrame.remove) currentGameFrame.remove();
    currentGameFrame = null;
  }
  const existingBackBtn = document.getElementById('backButton');
  if (existingBackBtn) existingBackBtn.remove();
  const existingError = document.getElementById('errorMsg');
  if (existingError) existingError.remove();
  document.body.classList.remove('game-active');
}

async function loadGame(game) {
  removeGame();
  closeSearchOverlay();
  
  const safeName = sanitizeGameName(game.name);
  if (!safeName) {
    showError("❌ Invalid game name.");
    return;
  }
  
  document.querySelector('h1').style.display = 'none';
  document.querySelector('.button-container').style.display = 'none';
  document.body.classList.add('game-active');
  
  const backButton = document.createElement('button');
  backButton.id = 'backButton';
  backButton.addEventListener('click', () => {
    location.reload();
  });
  document.body.appendChild(backButton);
  
  const indexUrl = `https://bladeclickers.github.io/${safeName}/index.html`;
  const swfUrl   = `https://bladeclickers.github.io/${safeName}.swf`;
  const otherUrl = `https://bladeclickers.github.io/${safeName}/${safeName}.html`;

  if (safeName == "eaglercraft") {
    window.location.href = otherUrl;
  }
  
  if (await urlExists(indexUrl)) {
    const iframe = document.createElement('iframe');
    iframe.className = 'game-iframe';
    iframe.src = indexUrl;
    iframe.sandbox = "allow-scripts allow-same-origin allow-popups allow-forms";
    iframe.allowFullscreen = true;
    document.body.appendChild(iframe);
    currentGameFrame = iframe;
  } else if (await urlExists(swfUrl)) {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    player.id = "gameFrame";
    player.style.position = "fixed";
    player.style.top = "0";
    player.style.left = "0";
    player.style.width = "100%";
    player.style.height = "100%";
    player.style.zIndex = "9999";
    player.style.border = "none";
    player.load(swfUrl);
    document.body.appendChild(player);
    currentGameFrame = player;
  } else if (await urlExists(otherUrl)) {
    const iframe = document.createElement('iframe');
    iframe.className = 'game-iframe';
    iframe.src = otherUrl;
    iframe.sandbox = "allow-scripts allow-same-origin allow-popups allow-forms";
    iframe.allowFullscreen = true;
    document.body.appendChild(iframe);
    currentGameFrame = iframe;
  } else {
    showError(`❌ Game "${game.formatted_Name}" not found.`);
    document.querySelector('h1').style.display = 'block';
    document.querySelector('.button-container').style.display = 'flex';
    document.body.classList.remove('game-active');
    removeGame();
  }
}

function showError(message) {
  const msg = document.createElement('div');
  msg.id = 'errorMsg';
  msg.textContent = message;
  document.body.appendChild(msg);
  setTimeout(() => {
    if (msg && msg.remove) msg.remove();
  }, 3000);
}

window.addEventListener('popstate', (event) => {
  if (event.state && event.state.playing) {
    location.reload();
  }
});

const container = document.querySelector('.button-container');
const searchInput = document.getElementById('searchInput');
const overlay = document.getElementById('searchOverlay');
const main = document.querySelector('.main');
const categoryButtons = document.querySelectorAll('.category-btn');
const searchBtn = document.getElementById('searchBtn');

searchBtn.onclick = () => {
  if (isSearchOpen) {
    overlay.classList.remove('active');
    main.style.marginTop = '0px'; 
  } else {
    overlay.classList.add('active');
    main.style.marginTop = '60px';
  }
  isSearchOpen = !isSearchOpen;
};

document.getElementById('toggleCategories').onclick = () => {
  document.getElementById('categoryContainer').classList.toggle('show');
};

categoryButtons.forEach(btn => {
  btn.onclick = () => {
    categoryButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGames('', btn.dataset.category);
  };
});

searchInput.addEventListener('input', () => {
  renderGames(searchInput.value); 
});

function renderGames(filter='', category='') {
  container.innerHTML = '';

  const filteredGames = games.filter(game => {
    const matchesCategory =
      category === '' ||
      (Array.isArray(game.category) &&
        game.category.some(cat => cat.toLowerCase().includes(category.toLowerCase())));

    const matchesName = game.formatted_Name.toLowerCase().includes(filter.toLowerCase());

    return matchesCategory && matchesName;
  });

  filteredGames.forEach(game => {
    const link = document.createElement('div');
    link.className = 'button-link';

    const img = document.createElement('img');
    img.className = 'sigma';
    img.loading = 'lazy';
    img.src = `https://raw.githubusercontent.com/bladeclickers/bladeclickers.github.io/refs/heads/main/images/${encodeURIComponent(game.name)}.png`;
    img.alt = game.formatted_Name;

    img.onerror = () => {
      img.onerror = null;
      img.src = `images/${encodeURIComponent(game.name)}.jpg`;
    };

    const title = document.createElement('div');
    title.textContent = game.formatted_Name;
    title.className = 'game-title';

    link.appendChild(img);
    link.appendChild(title);

    link.addEventListener('click', async () => {
      history.pushState({ playing: true }, '', '#game');
      await loadGame(game);
    });

    container.appendChild(link);
  });
}

renderGames();
</script>
</body>
</html>
