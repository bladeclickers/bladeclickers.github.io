<!DOCTYPE html>
<html>
  <head>
    <title>I Don't Care</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        animation: rainbow 5s ease-in-out infinite;
      }

      h1 {
        font-size: 5rem;
        text-transform: uppercase;
        text-align: center;
      }

      @keyframes rainbow {
        0% {
          color: red;
        }
        15% {
          color: orange;
        }
        30% {
          color: yellow;
        }
        45% {
          color: green;
        }
        60% {
          color: blue;
        }
        75% {
          color: indigo;
        }
        90% {
          color: violet;
        }
      }
    </style>
  </head>
  <body>
    <h1>I Don't Care</h1>
  </body>
</html>
